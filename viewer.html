<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; }
    model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
  </style>
</head>
<body>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <model-viewer
    id="viewer"
    src="./Mixing_Room_Save_4.glb"
    auto-rotate
    rotation-per-second="15deg"
    camera-controls
    interaction-prompt="none"
    exposure="1"
    shadow-intensity="1"
    environment-image="https://modelviewer.dev/shared-assets/environments/moon_1k.hdr"
    style="width:100%;height:100vh;"
  ></model-viewer>

  <script>
    const viewer = document.getElementById('viewer');
    let restartTimeout = null;
    let lastRadius = null;

    viewer.addEventListener('camera-change', (event) => {
      // Solo se il cambio è dovuto a interazione utente (non all'auto-rotate stesso)
      if (event.detail.source !== 'user-interaction') return;

      // Ferma l'auto-rotate durante l'interazione
      viewer.removeAttribute('auto-rotate');

      // Cancella eventuali timeout già in corso
      if (restartTimeout) clearTimeout(restartTimeout);

      // Determina se l'interazione è stata uno zoom o una rotazione,
      // confrontando il raggio (distanza camera) attuale col precedente
      const currentRadius = viewer.getCameraOrbit().radius;
      const isZoom = lastRadius !== null && Math.abs(currentRadius - lastRadius) > 0.001;
      lastRadius = currentRadius;

      const delay = isZoom ? 500 : 1000; // 0.5s per zoom, 1s per rotazione

      restartTimeout = setTimeout(() => {
        viewer.setAttribute('auto-rotate', '');
      }, delay);
    });
  </script>
</body>
</html>
